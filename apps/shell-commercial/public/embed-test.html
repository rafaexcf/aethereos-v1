<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aethereos — Embed Test</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #09090b; color: #e4e4e7; height: 100vh; display: flex; flex-direction: column; }
      header { padding: 12px 24px; border-bottom: 1px solid #27272a; font-size: 13px; color: #a1a1aa; }
      header strong { color: #a78bfa; }
      .layout { display: flex; flex: 1; overflow: hidden; }
      .sidebar { width: 280px; border-right: 1px solid #27272a; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
      .sidebar h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #71717a; margin-bottom: 4px; }
      .log-entry { font-size: 12px; font-family: monospace; background: #18181b; border: 1px solid #27272a; border-radius: 6px; padding: 8px; color: #86efac; white-space: pre-wrap; word-break: break-all; }
      .iframe-wrap { flex: 1; position: relative; }
      iframe { width: 100%; height: 100%; border: none; }
      .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 9999px; background: #27272a; color: #a1a1aa; }
      .badge.ready { background: #14532d; color: #86efac; }
    </style>
  </head>
  <body>
    <header>
      <strong>Aethereos</strong> — Embed Protocol Test
      <span id="status" class="badge" style="margin-left:8px">aguardando...</span>
    </header>
    <div class="layout">
      <div class="sidebar">
        <h2>postMessage log</h2>
        <div id="log"></div>
      </div>
      <div class="iframe-wrap">
        <iframe
          id="shell-frame"
          src="/?embed=true"
          title="Aethereos shell-commercial (embed)"
          allow="storage-access"
        ></iframe>
      </div>
    </div>

    <script>
      const log = document.getElementById('log');
      const status = document.getElementById('status');

      window.addEventListener('message', (event) => {
        // Em produção: verificar event.origin contra lista de origens permitidas
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.textContent = JSON.stringify(event.data, null, 2);
        log.prepend(entry);

        if (event.data?.type === 'embed.ready') {
          status.textContent = 'embed.ready ✓';
          status.className = 'badge ready';
        }

        console.log('[embed-test] postMessage received:', event.data);
      });
    </script>
  </body>
</html>
