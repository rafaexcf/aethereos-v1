version: "3.9"

# Infraestrutura local de desenvolvimento para Aethereos.
# Supabase é gerenciado separadamente via `pnpm db:start` (supabase CLI).
# Este compose provisiona: NATS JetStream, LiteLLM gateway, Langfuse, Unleash, OTel stack.
#
# Uso:
#   pnpm dev:infra              — sobe NATS + LiteLLM (infra mínima)
#   pnpm dev:observability      — sobe Langfuse + OTel stack
#   pnpm dev:feature-flags      — sobe Unleash
#   docker compose -f infra/local/docker-compose.dev.yml up -d  — tudo
#   docker compose -f infra/local/docker-compose.dev.yml down

services:
  # ---------------------------------------------------------------------------
  # NATS JetStream — event bus do SCP
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.11-alpine
    container_name: aethereos-nats-dev
    ports:
      - "4222:4222" # client connections
      - "8222:8222" # HTTP monitoring
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "--cluster_name=aethereos-dev"
      - "--name=aethereos-nats-dev"
      # Super Sprint B / MX208 — limites para SCP_EVENTS stream (~1GB / 256MB).
      - "--max_mem_store=256MB"
      - "--max_file_store=1GB"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # LiteLLM — gateway LLM unificado (ADR-0014 #6, P15)
  # Porta: 4000 | API OpenAI-compatible | config: infra/litellm/config.yaml
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: aethereos-litellm-dev
    ports:
      - "4000:4000"
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-dev-litellm-master-key-replace-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-placeholder}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      STORE_MODEL_IN_DB: "False"
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev-aethereos-replace-me}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev-aethereos-replace-me}
      LANGFUSE_HOST: http://langfuse:3000
    command:
      ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:4000/health/liveliness || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Langfuse — observabilidade LLM (traces, custos, qualidade)
  # Porta: 3001 | Login: admin@example.com / password
  # ---------------------------------------------------------------------------
  langfuse-postgres:
    image: postgres:16-alpine
    container_name: aethereos-langfuse-postgres-dev
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_dev_password
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: aethereos-langfuse-dev
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_dev_password@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: langfuse-dev-nextauth-secret-replace-in-prod
      SALT: langfuse-dev-salt-replace-in-prod
      ENCRYPTION_KEY: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: aethereos-dev-org
      LANGFUSE_INIT_ORG_NAME: Aethereos Dev
      LANGFUSE_INIT_PROJECT_ID: aethereos-dev-project
      LANGFUSE_INIT_PROJECT_NAME: Aethereos Dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-dev-aethereos-replace-me
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-dev-aethereos-replace-me
      LANGFUSE_INIT_USER_EMAIL: admin@aethereos.local
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: aethereos-dev-password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:3000/api/public/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Unleash — feature flags com segmentação por tenant/plan (ADR-0014 #8)
  # Porta: 4242 | Login: admin / unleash4all
  # ---------------------------------------------------------------------------
  unleash-postgres:
    image: postgres:16-alpine
    container_name: aethereos-unleash-postgres-dev
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash_dev_password
    volumes:
      - unleash_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash -d unleash"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  unleash:
    image: unleashorg/unleash-server:latest
    container_name: aethereos-unleash-dev
    depends_on:
      unleash-postgres:
        condition: service_healthy
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgresql://unleash:unleash_dev_password@unleash-postgres:5432/unleash
      DATABASE_SSL: "false"
      LOG_LEVEL: warn
      INIT_FRONTEND_API_TOKENS: "default:development.unleash-frontend-dev-token"
      INIT_CLIENT_API_TOKENS: "default:development.unleash-client-dev-token"
      INIT_ADMIN_API_TOKENS: "*:*.unleash-admin-dev-token"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4242/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — recebe OTLP e distribui para Tempo/Loki/Prometheus
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: aethereos-otel-collector-dev
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics (self)
    volumes:
      - ../otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana Tempo — distributed tracing backend
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.5.0
    container_name: aethereos-tempo-dev
    ports:
      - "3200:3200" # tempo HTTP API
      - "9095:9095" # tempo gRPC
    volumes:
      - ../otel/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana Loki — log aggregation backend
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: aethereos-loki-dev
    ports:
      - "3100:3100"
    volumes:
      - ../otel/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus — metrics backend
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: aethereos-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ../otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Temporal — workflow engine (Super Sprint D / MX224)
  # Postgres dedicado (NÃO compartilhar com Supabase). Auto-setup cria schemas.
  # gRPC 7233 (worker) | UI 8233 | Postgres dedicado 5435
  # Subir com: pnpm dev:temporal
  # ---------------------------------------------------------------------------
  temporal-db:
    image: postgres:16-alpine
    container_name: aethereos-temporal-db-dev
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5435:5432"
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: aethereos-temporal-dev
    depends_on:
      temporal-db:
        condition: service_healthy
    ports:
      - "7233:7233" # gRPC para workers
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-db
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development.yaml
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "tctl --address temporal:7233 namespace describe default || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: aethereos-temporal-ui-dev
    depends_on:
      - temporal
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana — dashboards (Tempo + Loki + Prometheus)
  # Porta: 3002 | Login: admin / admin
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: aethereos-grafana-dev
    depends_on:
      - tempo
      - loki
      - prometheus
    ports:
      - "3002:3000"
    volumes:
      - ../otel/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../otel/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    restart: unless-stopped

volumes:
  nats_data:
    driver: local
  langfuse_postgres_data:
    driver: local
  unleash_postgres_data:
    driver: local
  tempo_data:
    driver: local
  loki_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  temporal_db_data:
    driver: local
