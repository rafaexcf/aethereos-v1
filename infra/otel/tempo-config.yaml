stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9096
  # Fix keepalive errors em all-in-one mode: querier conecta a si mesmo via loopback
  # sem streams ativos; servidor precisa aceitar pings em conexões idle.
  grpc_server_min_time_between_pings: 10s
  grpc_server_ping_without_stream_allowed: true

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:9095

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
